name: Fetch Commit Data

on:
  schedule:
    - cron: '0 15 * * *'   # runs daily at 00:00 JST
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v5

      - name: Fetch commits from student repos
        env:
          GH_TOKEN: ${{ secrets.MENTOR_GITHUB_TOKEN }}
        run: node scripts/fetch-commits.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update commit data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin master